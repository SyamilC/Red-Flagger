<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Flagger Extension</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="mark">RF</div>
    <div>
      <h1>Red Flagger</h1>
      <p>Client-side profile audit</p>
    </div>
  </header>

  <div id="moduleStatus" class="module-status">
    <div class="module-pill warn">Loading</div>
  </div>

  <div class="mode-switch" role="radiogroup" aria-label="Audit mode">
    <label>
      <input type="radio" name="auditMode" value="bio_only" checked>
      <span>Bio Only</span>
    </label>
    <label>
      <input type="radio" name="auditMode" value="page_audit">
      <span>Page Audit</span>
    </label>
  </div>

  <label class="manual-input">
    Bio text
    <textarea id="manualBio" placeholder="Bio Only: paste a dating bio here. Page Audit: leave blank and let the extension find bio, metadata, and image from the page."></textarea>
  </label>

  <button id="analyzeBtn" type="button" disabled>Run Bio Audit</button>

  <div id="status" class="status">Loading client-side models...</div>
  <div id="results"></div>

  <footer>
    TFJS NLP scorer plus browser-safe tabular and visual heuristics.
  </footer>

  <script type="module" src="dist/popup.bundle.js"></script>
</body>
</html>
